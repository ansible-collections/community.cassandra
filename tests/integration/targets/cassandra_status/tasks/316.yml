- name: Execute module against the first ccm node with resolve_ip
  community.cassandra.cassandra_status:
    host: 127.0.0.1
    port: 7100
    nodetool_path: "/home/cassandra/config/repository/{{ cassandra_version }}/bin"
    resolve_ip: true
  register: rhys

- name: debug
  ansible.builtin.debug:
    var: rhys

- name: Install cassandra-driver
  pip:
    name: "cassandra-driver{{ ansible_python_version.startswith('2.7') | ternary('==3.26.*', '') }}"
  environment:
    CASS_DRIVER_NO_CYTHON: 1

- name: create keyspace
  community.cassandra.cassandra_keyspace:
    name: mytestkeyspace
    state: present

- name: keyspace flag 
  community.cassandra.cassandra_status:
    host: 127.0.0.1
    port: 7100
    nodetool_path: "/home/cassandra/config/repository/{{ cassandra_version }}/bin"
    keyspace: mytestkeyspace
  register: rhys

- name: debug
  ansible.builtin.debug:
    var: rhys

- name: resolve_ip & keyspace
  community.cassandra.cassandra_status:
    host: 127.0.0.1
    port: 7100
    nodetool_path: "/home/cassandra/config/repository/{{ cassandra_version }}/bin"
    resolve_ip: true
    keyspace: mytestkeyspace
  register: rhys

- name: debug
  ansible.builtin.debug:
    var: rhys

- name: Manage cluster hosts entries
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE CLUSTER HOSTS"
    block: |
      {% for host in hosts_entries %}
      {{ host.ip }} {{ host.node }}
      {% endfor %}
    unsafe_writes: true

- name: debug cmd
  shell: ./nodetool -h 127.0.0.1 -p 7100 status --resolve-ip
  args:
    chdir: "/home/cassandra/config/repository/{{ cassandra_version }}/bin"

- name: Execute module against the first ccm node with resolve_ip
  community.cassandra.cassandra_status:
    host: 127.0.0.1
    port: 7100
    nodetool_path: "/home/cassandra/config/repository/{{ cassandra_version }}/bin"
    resolve_ip: true
  register: rhys

- name: debug
  ansible.builtin.debug:
    var: rhys # TODO need to verify module outputs